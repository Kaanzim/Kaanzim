<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaanzim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --bg: #080814;
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(100,200,255,0.3);
    --text: #e8eaf6;
    --muted: rgba(255,255,255,0.4);
    --glow-blue: #00cfff;
    --glow-purple: #a855f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* Nebula glow blobs */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(168,85,247,0.15), transparent 70%);
    top: -100px; left: -100px;
    animation: drift1 20s ease-in-out infinite alternate;
  }
  .nebula-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,207,255,0.12), transparent 70%);
    bottom: -50px; right: -50px;
    animation: drift2 25s ease-in-out infinite alternate;
  }
  @keyframes drift1 { to { transform: translate(80px, 60px); } }
  @keyframes drift2 { to { transform: translate(-60px, -80px); } }

  .container {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 60px 20px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    margin-bottom: 24px;
    animation: fadeDown 0.8s ease both;
  }
  .avatar-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: conic-gradient(var(--glow-blue), var(--glow-purple), var(--glow-blue));
    padding: 3px;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .avatar-inner img {
    width: 94px; height: 94px;
    border-radius: 50%;
    object-fit: cover;
  }
  .avatar-glow {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,207,255,0.25), transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }

  /* Name */
  .name {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--glow-blue) 50%, var(--glow-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    animation: fadeDown 0.9s ease 0.1s both;
  }

  .tagline {
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 40px;
    animation: fadeDown 1s ease 0.2s both;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 22px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.03));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .link-btn:hover {
    background: var(--card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 32px rgba(0,207,255,0.1), 0 0 0 1px rgba(0,207,255,0.15);
  }
  .link-btn:hover::before { opacity: 1; }
  .link-btn:active { transform: scale(0.98); }

  .link-btn:nth-child(1) { animation-delay: 0.3s; }
  .link-btn:nth-child(2) { animation-delay: 0.4s; }
  .link-btn:nth-child(3) { animation-delay: 0.5s; }
  .link-btn:nth-child(4) { animation-delay: 0.6s; }
  .link-btn:nth-child(5) { animation-delay: 0.7s; }

  .link-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 1.1rem;
  }

  .icon-tiktok   { background: linear-gradient(135deg, #010101, #1a1a2e); border: 1px solid rgba(255,255,255,0.15); }
  .icon-youtube  { background: linear-gradient(135deg, #ff0000, #cc0000); }
  .icon-discord  { background: linear-gradient(135deg, #5865f2, #4752c4); }
  .icon-kick     { background: linear-gradient(135deg, #53fc18, #3bc412); }
  .icon-instagram{ background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

  .link-label { flex: 1; }
  .link-arrow {
    color: var(--muted);
    font-size: 0.9rem;
    transition: transform 0.2s, color 0.2s;
  }
  .link-btn:hover .link-arrow {
    transform: translateX(4px);
    color: var(--glow-blue);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<script>
// Starfield animation
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5,
      o: Math.random(),
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.twinkle += 0.02;
    const opacity = s.o * (0.5 + 0.5 * Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${opacity})`;
    ctx.fill();
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  });
  requestAnimationFrame(drawStars);
}

resize();
initStars();
drawStars();
window.addEventListener('resize', () => { resize(); initStars(); });
</script>
